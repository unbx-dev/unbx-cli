name: Synk Code Quarantine
description: Scan PR diffs for architecture policy violations and post inline fix suggestions as review comments.
author: Synk

branding:
  icon: shield
  color: purple

inputs:
  access_token:
    description: Synk API key (ACCESS_TOKEN). Store this in GitHub Secrets.
    required: true
  secret_token:
    description: Synk secret key (SECRET_TOKEN). Store this in GitHub Secrets.
    required: true
  github_token:
    description: GitHub token used to post review comments. Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}

runs:
  using: docker
  image: Dockerfile
  env:
    REPOSITORY_ID: ${{ github.repository_id }}
    ACCESS_TOKEN: ${{ inputs.access_token }}
    SECRET_TOKEN: ${{ inputs.secret_token }}
    GITHUB_TOKEN: ${{ inputs.github_token }}
    REPO_SLUG: ${{ github.repository }}
    SYNK_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
    PR_NUMBER: ${{ github.event.pull_request.number }}
